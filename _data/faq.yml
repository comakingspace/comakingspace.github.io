- question:
    de: "Brauche ich eine Mitgliedschaft, um den CoMakingSpace zu besuchen?"
    en: "Do I need a membership to visit the CoMakingSpace?"
  answer:
    de: "Nein! Du kannst jederzeit während unserer Öffnungszeiten vorbeikommen und dir den Space anschauen. Eine Mitgliedschaft ist erst nötig, wenn du regelmäßig Maschinen und Werkzeuge nutzen möchtest."
    en: "No! You can visit us anytime during our opening hours and have a look around. A membership is only needed if you want to regularly use machines and tools."

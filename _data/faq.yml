- question:
    de: "Brauche ich eine Mitgliedschaft, um den CoMakingSpace zu besuchen?"
    en: "Do I need a membership to visit the CoMakingSpace?"
  answer:
    de: "Nein! Du kannst jederzeit während unserer Öffnungszeiten vorbeikommen, dir den Space anschauen und eine gute Zeit im Gemeinschaftsraum verbringen. Eine Mitgliedschaft ist erst nötig, wenn du die Maschinen und Werkzeuge nutzen möchtest."
    en: "No! You can visit us anytime during our opening hours, have a look around and enjoy the common room. A membership is necessary to use the machines and tools."
- question:
    de: "Wann kann ich zum ersten Mal vorbeikommen?"
    en: "When can I visit the Space for the first time?"
  answer:
    de: "Schau einfach in den Kalender: unsere 'Making Hours' und 'Lunch Break Makes' sind ideal, um eine Führung zu bekommen und ein paar Mitglieder kennenzulernen. Details zu jedem Termin können durch Anklicken angezeigt werden!"
    en: "Take a look at our calendar: our 'Making Hours' and 'Lunch Break Makes' are the ideal opportunities to get a tour and meet a couple of members. Details are shown after clicking on any calendar entry!"
- question:
    de: "Darf ich etwas für die gewerbliche Nutzung bauen?"
    en: "Can I build something for commercial use?"
  answer:
    de: "Nein. Die gewerbliche Nutzung des CoMakingSpace ist ausgeschlossen."
    en: "No. Commercial use of the CoMakingSpace is prohibited."
